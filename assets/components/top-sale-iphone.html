<!-- ================= TOP SALE (FLIPKART STYLE) ================= -->

<section class="container py-5">

                    <h6 class="mt-3">iPhone 11</h6>
                    <h6 class="text-warning">₹50,000</h6>
                    <button class="btn btn-warning btn-sm w-100"

                </div>

        <button class="btn btn-warning position-absolute top-50 end-0 translate-middle-y"
