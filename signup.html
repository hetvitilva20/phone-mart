<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="assets/css/style.css" rel="stylesheet">
</head>
</head>

<body class="bg-light">

    <div class="container d-flex align-items-center justify-content-center vh-100">

        <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
            <h3 class="text-center mb-4">Create Account</h3>
            <form id="signupForm"> <!-- Name -->
                <div class="mb-3"> <label class="form-label">Full Name</label> <input type="text" id="name"
                        class="form-control" placeholder="Enter name" required> </div> <!-- Email -->
                <div class="mb-3"> <label class="form-label">Email address</label> <input type="email" id="email"
                        class="form-control" placeholder="Enter email" required> </div> <!-- Password -->
                <div class="mb-3"> <label class="form-label">Password</label> <input type="password" id="password"
                        class="form-control" placeholder="Enter password" required> </div> <!-- Terms -->
                <div class="form-check mb-3"> <input class="form-check-input" type="checkbox" required> <label
                        class="form-check-label"> I agree to the terms & conditions </label> </div> <!-- Button -->
                <button type="submit" class="btn btn-success w-100">Signup</button>
            </form> <!-- Links -->
            <div class="text-center mt-3">
                <p class="mb-1">Already have an account?</p> <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="bootstrap/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
</body>

</html>
